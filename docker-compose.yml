services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: always
    env_file: # ✅ ADD THIS BLOCK
      - ./backend/.env
    environment: # ✅ NEW (VERY IMPORTANT)
      DATABASE_URL: postgresql://soc_user:soc_pass@db:5432/soc_db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    restart: always

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: soc_user
      POSTGRES_PASSWORD: soc_pass
      POSTGRES_DB: soc_db
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
